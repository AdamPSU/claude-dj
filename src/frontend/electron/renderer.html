<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file:; img-src 'self' file:; media-src 'self' file:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClaudeDJ Mascot</title>
    <style>
      html,
      body {
        --mascot-visual-size: 190px;
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: end center;
      }

      .mascot-asset {
        width: var(--mascot-visual-size);
        height: var(--mascot-visual-size);
        object-fit: contain;
        cursor: grab;
        user-select: none;
        -webkit-user-drag: none;
      }

      body.dragging .mascot-asset {
        cursor: grabbing;
      }

      .mascot-asset.skating {
        transform: scale(1.44);
        transform-origin: bottom center;
      }

      #mascot-speaking {
        transform: translateY(16px);
      }

      #mascot-sleep {
        transform: translateY(16px);
      }

      [hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <video
      id="mascot-idle"
      class="mascot-asset"
      aria-label="ClaudeDJ mascot idle"
      muted
      loop
      playsinline
      preload="auto"
    ></video>
    <video
      id="mascot-sleep"
      class="mascot-asset"
      src="../public/claude-dj-mascot-sleeping-transparent.webm"
      aria-label="ClaudeDJ mascot sleeping"
      muted
      loop
      playsinline
      preload="auto"
      hidden
    ></video>
    <video
      id="mascot-speaking"
      class="mascot-asset"
      src="../public/claude-dj-mascot-singing-transparent.webm"
      aria-label="ClaudeDJ mascot singing into a microphone"
      muted
      loop
      playsinline
      preload="auto"
      hidden
    ></video>
    <video
      id="mascot-walk"
      class="mascot-asset"
      aria-label="ClaudeDJ mascot walking"
      muted
      loop
      playsinline
      preload="auto"
      hidden
    ></video>
    <script>
      const idleMascot = document.getElementById("mascot-idle");
      const sleepMascot = document.getElementById("mascot-sleep");
      const speakingMascot = document.getElementById("mascot-speaking");
      const walkingMascot = document.getElementById("mascot-walk");
      const idleSources = [
        "../public/claude-dj-mascot-headphones-bob.webm",
        "../public/claude-dj-mascot-headphones-wink-bob.webm",
      ];
      const walkSources = {
        left: [
          "../public/claude-dj-mascot-walk-left-transparent.webm",
          "../public/claude-skate-left-transparent.webm",
        ],
        right: [
          "../public/claude-dj-mascot-walk-right-transparent.webm",
          "../public/claude-skate-right-transparent.webm",
        ],
      };
      let activePointerId = null;
      let currentWalkDirection = null;
      let audioContext = null;

      function setActiveAsset(activeAsset) {
        for (const asset of [idleMascot, sleepMascot, speakingMascot, walkingMascot]) {
          if (asset === activeAsset) {
            asset.hidden = false;
            if (asset.play) {
              asset.play().catch(() => {});
            }
          } else {
            if (asset.pause) {
              asset.pause();
            }
            asset.hidden = true;
          }
        }
      }

      function playMascotClickSound() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;

        if (!AudioContext) {
          return;
        }

        if (!audioContext) {
          audioContext = new AudioContext();
        }

        audioContext.resume().then(() => {
          const sampleRate = audioContext.sampleRate;
          const durationSeconds = 0.36;
          const frameCount = Math.floor(sampleRate * durationSeconds);
          const buffer = audioContext.createBuffer(1, frameCount, sampleRate);
          const samples = buffer.getChannelData(0);
          const pixelSampleRate = 12000;
          const holdSamples = Math.max(1, Math.floor(sampleRate / pixelSampleRate));
          const pitchPersonality = 0.94 + Math.random() * 0.16;
          const squeakAmount = 0.85 + Math.random() * 0.3;
          let heldSample = 0;

          for (let frame = 0; frame < frameCount; frame += 1) {
            if (frame % holdSamples === 0) {
              const t = frame / sampleRate;
              const phase = t / durationSeconds;
              const yelp = Math.exp(-Math.pow((phase - 0.12) / 0.09, 2));
              const ouch = Math.exp(-Math.pow((phase - 0.58) / 0.28, 2));
              const attack = Math.min(1, t / 0.012);
              const release = Math.max(0, 1 - Math.max(0, t - 0.24) / 0.12);
              const envelope = Math.min(1, (0.95 * yelp + 0.72 * ouch) * attack) * release;
              const isOwTail = phase > 0.32;
              const vibrato = 1 + 0.045 * Math.sin(2 * Math.PI * 18 * t);
              const pitch =
                (isOwTail
                  ? 1160 - 330 * ((phase - 0.32) / 0.68)
                  : 2600 - 900 * (phase / 0.32)) *
                pitchPersonality *
                vibrato;
              const formantA = (isOwTail ? 2450 : 4200) * pitchPersonality;
              const formantB = (isOwTail ? 3750 : 6500) * pitchPersonality;
              const chirp = Math.sin(2 * Math.PI * (pitch * 2.35) * t) * yelp * 0.16 * squeakAmount;
              const voice =
                0.52 * Math.sign(Math.sin(2 * Math.PI * pitch * t)) +
                0.26 * Math.sin(2 * Math.PI * formantA * t) +
                0.16 * Math.sin(2 * Math.PI * formantB * t) +
                chirp;
              const crackle = (Math.random() * 2 - 1) * 0.025;
              const quantized = Math.round((voice + crackle) * envelope * 10) / 10;

              heldSample = Math.max(-0.24, Math.min(0.24, quantized));
            }

            samples[frame] = heldSample;
          }

          const source = audioContext.createBufferSource();
          const gain = audioContext.createGain();
          const lowpass = audioContext.createBiquadFilter();

          source.buffer = buffer;
          lowpass.type = "lowpass";
          lowpass.frequency.value = 7200;
          gain.gain.value = 0.85;

          source.connect(lowpass);
          lowpass.connect(gain);
          gain.connect(audioContext.destination);
          source.start();
        });
      }

      function randomIdleSource() {
        return idleSources[Math.floor(Math.random() * idleSources.length)];
      }

      function randomWalkSource(direction) {
        const sources = walkSources[direction];
        return sources[Math.floor(Math.random() * sources.length)];
      }

      function setIdle() {
        currentWalkDirection = null;
        idleMascot.src = randomIdleSource();
        idleMascot.load();
        setActiveAsset(idleMascot);
      }

      function setSleeping() {
        currentWalkDirection = null;
        setActiveAsset(sleepMascot);
      }

      function setSpeaking() {
        currentWalkDirection = null;
        setActiveAsset(speakingMascot);
      }

      function setWalking(direction) {
        if (!walkSources[direction]) {
          setIdle();
          return;
        }

        if (currentWalkDirection !== direction) {
          const walkSource = randomWalkSource(direction);

          currentWalkDirection = direction;
          walkingMascot.classList.toggle("skating", walkSource.includes("skate"));
          walkingMascot.src = walkSource;
          walkingMascot.load();
        }

        setActiveAsset(walkingMascot);
      }

      function activeMascotElement() {
        return [idleMascot, sleepMascot, speakingMascot, walkingMascot].find((video) => !video.hidden) || idleMascot;
      }

      function endDrag() {
        if (activePointerId === null) {
          return;
        }

        activePointerId = null;
        document.body.classList.remove("dragging");
        window.claudeDjMascot.endDrag();
      }

      document.body.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        playMascotClickSound();
        activePointerId = event.pointerId;
        activeMascotElement().setPointerCapture(event.pointerId);
        document.body.classList.add("dragging");
        window.claudeDjMascot.startDrag(event.screenX);
      });

      document.body.addEventListener("pointermove", (event) => {
        if (activePointerId !== event.pointerId) {
          return;
        }

        window.claudeDjMascot.dragTo(event.screenX);
      });

      document.body.addEventListener("pointerup", endDrag);
      document.body.addEventListener("pointercancel", endDrag);

      window.claudeDjMascot.onMotion((motion) => {
        if (motion.state === "walking") {
          setWalking(motion.direction);
          return;
        }

        if (motion.state === "sleeping") {
          setSleeping();
          return;
        }

        if (motion.state === "speaking") {
          setSpeaking();
          return;
        }

        setIdle();
      });

      setIdle();
    </script>
  </body>
</html>
